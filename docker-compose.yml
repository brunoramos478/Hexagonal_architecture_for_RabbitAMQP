version: "3.9"

services:

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbit-fusion-bank-api
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - monitoring

  redis:
    image: redis:7-alpine
    container_name: redis-fusion-bank-api
    ports:
      - "6379:6379"
    networks:
      - monitoring

  app:
    build: .
    container_name: app-fusion-bank-api
    ports:
      - "8082:8082"
    networks:
      - monitoring
    depends_on:
      - rabbitmq
      - redis
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8082/actuator/health/readiness"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus-fusion-bank-api
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    ports:
      - "9091:9090"
    networks:
      - monitoring
    depends_on:
      - app

  grafana:
    image: grafana/grafana:latest
    container_name: grafana-fusion-bank-api
    ports:
      - "3031:3000"
    networks:
      - monitoring
    depends_on:
      - prometheus

networks:
  monitoring:
    driver: bridge