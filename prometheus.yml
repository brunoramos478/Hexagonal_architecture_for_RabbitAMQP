global:
  scrape_interval: 5s
  scrape_timeout: 4s
  evaluation_interval: 5s
  external_labels:
    monitor: "fusionbank-api"

scrape_configs:
  - job_name: "fusionbank-api"
    metrics_path: "/actuator/prometheus"
    scrape_interval: 5s
    scrape_timeout: 4s

    static_configs:
      - targets: ["app:8082"]